<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: blue gradient rounded square -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="b4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- 4 Bars -->
  <rect x="2"  y="22" width="5" height="8"  rx="1.5" fill="url(#b1)"/>
  <rect x="9"  y="18" width="5" height="12" rx="1.5" fill="url(#b2)"/>
  <rect x="16" y="13" width="5" height="17" rx="1.5" fill="url(#b3)"/>
  <rect x="23" y="8"  width="5" height="22" rx="1.5" fill="url(#b4)"/>

  <!-- Trend line with glow -->
  <line x1="4.5" y1="21.5" x2="25.5" y2="7"
    stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"
    filter="url(#glow)" opacity="0.95"/>

  <!-- Peak diamond -->
  <polygon points="25.5,4.5 27.5,7 25.5,9.5 23.5,7"
    fill="#22d3ee" filter="url(#glow)"/>
</svg>
